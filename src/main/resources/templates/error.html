<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">
<head th:replace="~{shared/head.html :: head('New tank')}"></head>
<body>
<div th:replace="~{shared/navbar.html :: navbar}"></div>

<div class="d-flex flex-column gap-1 align-items-center">
    <h1 class="fw-bold" th:text="${status}"></h1>
    <p class="text-secondary" th:text="${error}"></p>
    <p class="text-secondary" th:text="${message}" th:if="${message != error}"></p>
</div>

<footer th:replace="~{fragments/footer.html :: footer}"></footer>
</body>
</html>
