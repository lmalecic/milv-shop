<!DOCTYPE html>
<html lang="en">

<div class="order card p-3">
    <div class="row mb-3">
        <div class="col">
            <div class="mb-2">
                <span class="badge text-uppercase fs-6" style="width: fit-content;" th:classappend="${order.status.getBadgeClass()}">
                    <i class="bi bi-clock-fill" th:if="${T(com.lmalecic.milvshop.entity.OrderStatus).PENDING.name() == order.status.name()}"></i>
                    <i class="bi bi-x-lg" th:if="${T(com.lmalecic.milvshop.entity.OrderStatus).CANCELLED.name() == order.status.name()}"></i>
                    <i class="bi bi-check-lg" th:if="${T(com.lmalecic.milvshop.entity.OrderStatus).COMPLETED.name() == order.status.name()}"></i>
                    <span th:text="${order.status.getDisplayName()}"></span>
                </span>
                <span class="badge text-uppercase fs-6" style="width: fit-content;">
                    <i class="bi bi-cash-coin" th:if="${T(com.lmalecic.milvshop.entity.PaymentType).CASH.name() == order.paymentType.name()}"></i>
                    <i class="bi bi-paypal" th:if="${T(com.lmalecic.milvshop.entity.PaymentType).PAYPAL.name() == order.paymentType.name()}"></i>
                    <span th:text="${order.paymentType.name()}"></span>
                </span>
            </div>
            <div class="text-secondary fw-medium">
                <span th:text="${#temporals.format(order.orderDate(), 'MMMM d, yyyy HH:mm', #locale.ENGLISH)}"></span>
                <span>&vert;</span>
                <span th:text="'Order No: ' + ${order.id}"></span>
                <span th:if="${T(com.lmalecic.milvshop.viewmodel.ViewContext).ADMIN.name() == viewContext.name()}">
                    <span>&vert;</span>
                    <span th:text="'Customer: ' + ${order.user.getDisplayName()}"></span>
                </span>
            </div>
        </div>
        <div class="col-auto d-flex gap-2 me-2">
            <span class="text-secondary fw-medium text-uppercase pt-1">Total</span>
            <span class="fs-4 fw-medium" th:text="${@formats.price(order.getTotal(), #locale)}"></span>
        </div>
    </div>
    <div class="row d-flex gap-3">
        <div class="cart-item d-flex gap-3" style="height: fit-content;" th:each="item : ${order.items()}">
            <div class="col d-flex gap-3">
                <img class="cart-item-img border border-2 rounded-3 p-2 h-100" th:src="${item.item().getPurchasableImageUrl()}" alt="Item Image">
                <div class="d-flex flex-column gap-2 w-100">
                    <div class="d-flex flex-row gap-3">
                        <div class="d-flex flex-column">
                            <div class="d-flex gap-2 mb-1">
                                <div class="badge text-bg-light d-inline-flex gap-1" th:text="${item.item().getPurchasableType().getDisplayName()}"></div>
                                <div class="badge text-bg-light d-inline-flex gap-1" th:each="badge : ${item.item().getPurchasableAttributes().badges}">
                                    <img th:if="${badge.imgUrl != null}" th:src="${badge.imgUrl}" alt="[?]" class="badge-image" style="border-radius: 3px;">
                                    <span th:text="${badge.text}"></span>
                                </div>
                            </div>
                            <div class="fs-4 fw-bold" th:text="${item.item().getPurchasableName()}"></div>
                            <div class="fw-medium text-secondary" th:text="'Quantity: x' + ${item.quantity}"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-auto">
                <div class="d-flex flex-row mt-auto align-items-end gap-2 h-100">
                    <div class="ms-auto text-end">
                        <div class="fw-semibold" th:text="${@formats.price(item.item.getPurchasablePrice().multiply(item.quantity), #locale)}" style="font-size: 1.2em;"></div>
                        <div class="text-secondary fw-semibold" th:text="'each ' + ${@formats.price(item.item.getPurchasablePrice(), #locale)}" th:if="${item.quantity > 1}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="row mt-3" th:if="${T(com.lmalecic.milvshop.viewmodel.ViewContext).ADMIN.name() == viewContext.name()}">
        <div class="d-flex flex-row justify-content-end gap-3">
            <button class="btn btn-danger text-uppercase"
                    th:if="${T(com.lmalecic.milvshop.entity.OrderStatus).PENDING.name() == order.status.name()}"
                    hx:patch="@{/admin/orders/{id}/cancel(id=${order.id})}"
                    hx-target="closest div.order"
                    hx-swap="outerHTML">
                <i class="bi bi-x-lg"></i>
                Cancel
            </button>
            <button class="btn btn-primary text-uppercase"
                    th:if="${T(com.lmalecic.milvshop.entity.OrderStatus).PENDING.name() == order.status.name()}"
                    hx:patch="@{/admin/orders/{id}/complete(id=${order.id})}"
                    hx-target="closest div.order"
                    hx-swap="outerHTML">
                <i class="bi bi-check-lg"></i>
                Complete
            </button>
            <button class="btn btn-secondary text-uppercase"
                    th:unless="${T(com.lmalecic.milvshop.entity.OrderStatus).PENDING.name() == order.status.name()}"
                    hx:patch="@{/admin/orders/{id}/undo(id=${order.id})}"
                    hx-target="closest div.order"
                    hx-swap="outerHTML">
                <i class="bi bi-arrow-counterclockwise"></i>
                Undo
            </button>
        </div>
    </div>
</div>

</html>
