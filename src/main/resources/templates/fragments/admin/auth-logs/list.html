<!DOCTYPE html>
<html lang="en">
<head th:replace="~{fragments/layout :: head('Admin | Auth Logs')}">
    <title>Admin &vert; Users</title>
</head>

<table class="w-100 mt-3">
    <tr th:with="authLogMetadata=${T(com.lmalecic.milvshop.entity.AuthLog_)}">
        <th class="col-1 text-uppercase">
            <div class="table-header" th:text="${authLogMetadata.id.getName()}"></div>
        </th>
        <th class="col-1 text-uppercase">
            <div class="table-header" th:text="${authLogMetadata.timestamp.getName()}"></div>
        </th>
        <th class="col text-uppercase">
            <div class="table-header">Username</div>
        </th>
        <th class="col-3 text-uppercase">
            <div class="table-header">Ip Address</div>
        </th>
    </tr>
    <!--/*@thymesVar id="authLogs" type="java.util.List<com.lmalecic.milvshop.dto.AuthLogDto>"*/-->
    <tr th:each="authLog : ${authLogs}">
        <td class="col-1">
            <div class="table-cell" th:text="${authLog.id}"></div>
        </td>
        <td class="col-2">
            <div class="table-cell" th:text="${#temporals.format(authLog.timestamp, 'dd.MM.yyyy. HH:mm')}"></div>
        </td>
        <td class="col">
            <div class="table-cell" th:text="${authLog.username}"></div>
        </td>
        <td class="col-3">
            <div class="table-cell" th:text="${authLog.ipAddress}"></div>
        </td>
    </tr>
</table>

</html>
