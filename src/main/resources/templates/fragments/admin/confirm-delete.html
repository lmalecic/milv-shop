<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">

<form th:action="@{#}" class="modal-content form-group">
    <div class="modal-header pb-0">
        <h4 class="text-uppercase modal-title command-text">Attention</h4>
        <button th:replace="~{fragments/dialog-modal :: close-btn}"></button>
    </div>
    <div class="modal-body mx-1 pt-2">
        <p>Please confirm entity deletion. This action is recoverable.</p>
        <h5 class="mb-1 text-center" th:text="${'Entity — ' + targetObject.getDisplayableType()}">Entity</h5>
        <div class="d-flex flex-row w-100 mb-2" th:each="element : ${targetObject.getDisplayElements()}">
            <div th:text="${element.fieldName()}" class="align-self-start"></div>
            <div class="separator-dots flex-grow-1 mx-1"></div>
            <div th:text="${element.fieldValue()}" class="align-self-end"></div>
        </div>
    </div>
    <div class="modal-footer pt-0 gap-3">
        <button type="button"
                data-bs-toggle="modal"
                data-bs-target="#tankModal"
                class="col btn btn-primary text-uppercase d-inline-flex justify-content-center gap-1">
            <i class="bi bi-x-lg"></i>
            Cancel
        </button>
        <button type="submit" id="confirmDeleteButton"
                hx:delete="${formAction}"
                hx-target="#tankModalContent"
                data-bs-toggle="modal"
                data-bs-target="#tankModal"
                class="col btn btn-danger text-uppercase d-inline-flex justify-content-center gap-1">
            <i class="bi bi-trash-fill"></i>
            Confirm
        </button>
    </div>
</form>

</html>
