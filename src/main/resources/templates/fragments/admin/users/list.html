<!DOCTYPE html>
<html lang="en">
<head th:replace="~{fragments/layout :: head('Admin | Users')}">
    <title>Admin &vert; Users</title>
</head>

<!--/*@thymesVar id="results" type="com.lmalecic.milvshop.results.UserSearchResults"*/-->
<table class="w-100" th:object="${results.users}">
    <tr th:with="userMetadata=${T(com.lmalecic.milvshop.model.User_)}">
        <th class="col-1 text-uppercase">
            <div class="table-header" th:text="${userMetadata.id.getName()}"></div>
        </th>
        <th class="col-1 text-uppercase">
            <div class="table-header">Active</div>
        </th>
        <th class="col text-uppercase">
            <div class="table-header" th:text="${userMetadata.username.getName()}"></div>
        </th>
        <th class="col-3 text-uppercase">
            <div class="table-header" th:text="${userMetadata.roles.getName()}"></div>
        </th>
    </tr>
    <tr th:each="user : ${results.users()}">
        <td class="col-1">
            <div class="table-cell" th:text="${user.id}"></div>
        </td>
        <td class="col-1 text-center">
            <div class="table-cell" th:text="${user.deleted} ? '❌' : '✅'"></div>
        </td>
        <td class="col">
            <div class="table-cell" th:text="${user.username}"></div>
        </td>
        <td class="col-3">
            <div class="table-cell" th:text="${user.getRolesString()}"></div>
        </td>
    </tr>
</table>

</html>
