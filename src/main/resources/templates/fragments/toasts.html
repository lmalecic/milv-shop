<!DOCTYPE html>
<html lang="en">

<div id="toastsContainer" class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="simpleToast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">
                Simple toast
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script>
    (() => {
        const toastsContainer = $("#toastsContainer");
        const simpleToastTemplate = $("#simpleToast");

        htmx.on("pushToast", function (e) {
            const message = e.detail.message;
            const toastType = e.detail.type;
            const toast = simpleToastTemplate.clone();
            toast.addClass(`toast-${toastType}`);
            toast.removeAttr("id");
            $(".toast-body", toast).text(message);
            toast.appendTo(toastsContainer);

            toast.on("hidden.bs.toast", function () {
                toast.remove();
            })

            const toastBootstrap = bootstrap.Toast.getOrCreateInstance(toast);
            toastBootstrap.show();
        })
    })();
</script>

</html>
