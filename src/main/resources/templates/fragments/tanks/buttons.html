<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">

<button th:fragment="create" class="tank-card btn btn-secondary w-100 h-100 p-0 d-flex flex-column border-2 text-decoration-none fw-bold"
        hx:get="@{/admin/tanks/create}"
        hx-target="#tankModalContent"
        hx-trigger="click"
        data-bs-toggle="modal"
        data-bs-target="#tankModal">
    <span class="fs-1 card-img">&plus;</span>
    <span class="fs-5 text-uppercase card-img">&lsqb;Create&rsqb;</span>
</button>

<!--/*@thymesVar id="tank" type="com.lmalecic.milvshop.dto.TankDto"*/-->
<button th:fragment="item"
   th:object="${tank}"
   hx:get="@{{itemClickPath}/{id}(itemClickPath=${itemClickPath}, id=*{id})}"
   hx-target="#tankModalContent"
   hx-trigger="click"
   data-bs-toggle="modal"
   data-bs-target="#tankModal"
   class="tank-card card border-2 p-2 text-decoration-none  w-100 h-100 p-0"
   th:classappend="*{deleted} ? 'deleted'">
    <img th:src="*{imgPath}" class="card-img text-center" alt="[NO IMAGE]">
    <span class="top-left-corner d-flex align-items-start flex-row gap-1" style="max-width: 90%;">
        <span class="card-stat rounded-3 fs-6 d-inline-flex flex-row"
             th:classappend="*{deleted} ? 'deleted'">
            <img th:src="*{nation.imgPath}" alt="" class="rounded-1 icon">
            <span th:text="*{name}" class="fw-semibold" th:classappend="*{deleted} ? 'text-decoration-line-through'"></span>
            <img th:src="*{tankRole.imgPath}" alt="" class="icon">
        </span>
    </span>
    <span th:text="${@formatUtils.getPriceString(tank.price)}"
         th:classappend="*{deleted} ? 'text-decoration-line-through'"
         class="tank-card-price position-absolute rounded-3 fs-6 fw-semibold">
    </span>
</button>

</html>
