<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" lang="en">

<form class="modal-content from-group" th:object="${tank}">
    <div class="modal-header">
        <h4 class="modal-title command-text">VIEW_TANK</h4>
        <button th:replace="~{fragments/dialog-modal :: close-btn}"></button>
    </div>
    <div class="modal-body row">
        <div class="col d-inline-flex flex-column gap-2" style="max-width: 30%" th:if="*{imgPath != null}">
            <div class="tank-card card p-2 border-2 rounded-4">
                <img class="card-img" th:src="*{imgPath}" alt="[NO IMAGE]">
            </div>
            <p class="text-uppercase text-center mb-0">Stat card</p>
            <div class="d-inline-flex flex-column align-items-stretch flex-wrap gap-2">
                <a th:href="@{/tanks(crewSize=*{crewSize})}"
                   class="filter-btn border border-0 text-white d-inline-flex flex-row gap-1 rounded-3 text-decoration-none"
                   style="font-size: 0.9em;">
                    <img class="rounded-1 flag-sm" src="/img/stats/crewSize.png" alt="">
                    <span class="text-uppercase me-auto">Crew size</span>
                    <span th:text="*{crewSize}"></span>
                </a>
                <a th:href="@{/tanks(mainGunCalibre=*{mainGunCalibre})}"
                   class="filter-btn border border-0 text-white d-inline-flex flex-row gap-1 rounded-3 text-decoration-none"
                   style="font-size: 0.9em;">
                    <img class="rounded-1 flag-sm" src="/img/stats/mainGunCalibre.png" alt="">
                    <span class="text-uppercase me-auto">Cannon calibre</span>
                    <span th:text="*{mainGunCalibre + 'mm'}"></span>
                </a>
                <a th:href="@{/tanks(armorThicknessMin=*{armorThickness}, armorThicknessMax=*{armorThickness})}"
                   class="filter-btn border border-0 text-white d-inline-flex flex-row gap-1 rounded-3 text-decoration-none"
                   style="font-size: 0.9em;">
                    <img class="rounded-1 flag-sm" src="/img/stats/armorThickness.png" alt="">
                    <span class="text-uppercase me-auto">Armour thickness</span>
                    <span th:text="*{armorThickness + 'mm'}"></span>
                </a>
                <a th:href="@{/tanks(maxSpeed=*{maxSpeed})}"
                   class="filter-btn border border-0 text-white d-inline-flex flex-row gap-1 rounded-3 text-decoration-none"
                   style="font-size: 0.9em;">
                    <img class="rounded-1 flag-sm" src="/img/stats/maxSpeed.png" alt="">
                    <span class="text-uppercase me-auto">Max speed</span>
                    <span th:text="*{maxSpeed + 'km/h'}"></span>
                </a>
            </div>
        </div>
        <div class="col">
            <div class="row">
                <div class="d-inline-flex gap-2 w-100">
                    <a type="button"
                       th:href="@{/tanks(nationIds=*{nation.id})}"
                       class="filter-btn border border-0 text-white d-inline-flex flex-row align-items-center gap-2 rounded-3 text-decoration-none">
                        <img class="rounded-1 flag-sm" th:src="*{nation.imgPath}" alt="">
                        <span class="fs-6" th:text="*{nation.name}"></span>
                    </a>
                    <a type="button"
                       th:href="@{/tanks(tankRoleIds=*{tankRole.id})}"
                       class="filter-btn border border-0 text-white d-inline-flex flex-row align-items-center gap-2 rounded-3 text-decoration-none">
                        <img class="rounded-1 flag-sm" th:src="*{tankRole.imgPath}" alt="">
                        <span class="fs-6" th:text="*{tankRole.name}"></span>
                    </a>
                    <div id="price" class="text-end fs-4 text-secondary fw-bold ms-auto mb-0" th:text="${@formatUtils.getPriceString(tank.price.floatValue())}" th:data-price="*{price.floatValue()}"></div>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <h1 class="modal-title me-auto" th:text="*{name}">Tank name</h1>
                    <p th:text="*{description}" class="text-secondary" style="text-align: justify"></p>
                </div>
                <div class="col-auto mt-2">
                    <label class="d-flex flex-column gap-2">
                    <span class="input-group">
                        <button type="button" id="decrementQuantity" class="input-group-text fw-bolder">&minus;</button>
                        <input id="quantity" name="quantity" class="form-control text-center" type="number" value="1" min="1" max="99">
                        <button type="button" id="incrementQuantity" class="input-group-text fw-bolder">&plus;</button>
                    </span>
                    </label>
                    <button type="submit" class="btn btn-primary text-uppercase d-inline-flex gap-1">
                        <i class="bi bi-cart-plus-fill"></i>Add to cart
                    </button>
                </div>
            </div>
        </div>
    </div>
</form>

<script th:inline="javascript" type="text/javascript">
    (() => {
        const quantityInput = $("#quantity");
        const decrementBtn = $("#decrementQuantity");
        const incrementBtn = $("#incrementQuantity");
        const price = $("#price");

        quantityInput.on('keydown', (e) => {
            if (e.key.length === 1 && /\D/.test(e.key)) {
                e.preventDefault();
            }
        });

        function validateQuantity() {
            let value = Number.parseInt(quantityInput.val());
            const min = Number.parseInt(quantityInput.attr('min'));
            const max = Number.parseInt(quantityInput.attr('max'));

            if (Number.isNaN(value) || value < min) {
                quantityInput.val(min);
                value = min;
            } else if (value > max) {
                quantityInput.val(max);
                value = max;
            }

            decrementBtn.prop("disabled", value <= min);
            incrementBtn.prop("disabled", value >= max);

            $.ajax("/api/format/price", {
                data: {
                    value: Number.parseFloat(price.data("price")),
                    amount: value,
                    locale: "hr-HR"
                },
            }).done(data => {
                price.text(data);
            })
        }

        quantityInput.on('focusout', validateQuantity);
        quantityInput.on('load', validateQuantity);
        price.on('load', validateQuantity);

        decrementBtn.on("click", () => {
            quantityInput.get(0).stepDown();
            validateQuantity();
        });

        incrementBtn.on("click", () => {
            quantityInput.get(0).stepUp();
            validateQuantity();
        });
    })();
</script>

</html>
